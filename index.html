<!DOCTYPE html>
<html lang="ENG">
<head>
    <title>ESP IOT DASHBOARD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="libs/nipplejs.min.js"></script>
    <script type="module" src="index.js"></script>
    <script type="module" src="components/Range.js"></script>
</head>
<body>
<div class="topbar">
    <input id="esp32-ip" class="ip-input" type="text" placeholder="192.168.1.106">
    <button id="wifi-connect-btn" class="conn-btn">Connect</button>
    <div class="toggle-wrap">
        <span class="toggle-label-wifi">WiFi</span>
        <label class="toggle">
            <input type="checkbox" id="mode-toggle">
            <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label-ble">BLE</span>
    </div>
    <span id="status-text" class="status-text">Not connected</span>
</div>
<div class="content">
    <div class="card-grid">
        <div class="joystick-card" id="joystick-zone-1"></div>
        <div class="joystick-card" id="joystick-zone-2"></div>
    </div>
</div>
</body>
</html>
